name: Generate Audio Briefing

on:
  workflow_dispatch:
    inputs:
      brief_date:
        description: "Brief date (YYYY-MM-DD)"
        required: true
        type: string

concurrency:
  group: generate-audio-${{ inputs.brief_date }}
  cancel-in-progress: false

jobs:
  audio:
    if: ${{ !contains(fromJSON('["0","false","False","FALSE","no","No","NO","off","Off","OFF"]'), vars.ENABLE_AUDIO_BRIEF || '') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env
        run: |
          cat <<EOF > .env
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          VOICE_API_KEY=${{ secrets.VOICE_API_KEY }}
          REVALIDATION_SECRET=${{ secrets.REVALIDATION_SECRET }}
          SITE_URL=${{ secrets.SITE_URL }}
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          ENABLE_AUDIO_BRIEF=${{ vars.ENABLE_AUDIO_BRIEF || 'true' }}
          VOICE_BASE_URL=${{ vars.VOICE_BASE_URL || 'https://txt2sph.audarai.com' }}
          ENABLE_SSML_BREAK_MARKERS=${{ vars.ENABLE_SSML_BREAK_MARKERS || 'false' }}
          ENABLE_FRENCH_AUDIO=true
          ENABLE_ARABIC_AUDIO=true
          FRENCH_VOICE_ID=${{ secrets.FRENCH_VOICE_ID || 'c365oriviHmAhyLhpuN6' }}
          ARABIC_VOICE_ID=${{ secrets.ARABIC_VOICE_ID || '' }}
          ENABLE_LEARNING_CONTENT=true
          EOF

      - name: Write frontend/.env.local
        run: |
          mkdir -p frontend
          cat <<EOF > frontend/.env.local
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          EOF

      - name: Generate audio briefing from published brief
        run: cd backend && python generate_audio.py --date "${{ inputs.brief_date }}" --from-db
