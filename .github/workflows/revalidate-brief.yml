name: Revalidate Brief Pages

on:
  workflow_dispatch:
    inputs:
      brief_date:
        description: "Brief date to revalidate (YYYY-MM-DD)"
        required: true
        type: string

jobs:
  revalidate:
    runs-on: ubuntu-latest

    steps:
      - name: Revalidate brief routes
        env:
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          BRIEF_DATE: ${{ inputs.brief_date }}
        run: |
          set -euo pipefail
          TARGET_URL="${SITE_URL:-${NEXT_PUBLIC_SITE_URL:-https://www.mbzuai-intel.com}}"
          revalidate_path() {
            local path="$1"
            response="$(curl -sS -L -f -X POST "${TARGET_URL}/api/revalidate" \
              -H "Content-Type: application/json" \
              -H "x-revalidate-secret: ${REVALIDATION_SECRET}" \
              --data "{\"path\":\"${path}\"}")"
            echo "$response"
          }
          revalidate_path "/brief/today"
          revalidate_path "/brief/${BRIEF_DATE}"
