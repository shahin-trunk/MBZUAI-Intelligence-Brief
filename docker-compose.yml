# =============================================================================
# MBZUAI Intelligence Brief - Docker Compose
# =============================================================================
#
# Services:
#   traefik    - Reverse proxy with automatic HTTPS (Let's Encrypt)
#   frontend   - Next.js 16 web application
#   dispatcher - FastAPI service for triggering GitHub Actions workflows
#   redis      - Celery message broker and result backend
#   celery-worker-* - Background task workers (llm, audio, learning)
#
# Usage:
#   docker compose up -d                  # start all services
#   docker compose up -d --build          # rebuild and start
#   docker compose logs -f frontend       # follow frontend logs
#   docker compose down                   # stop all services
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik — Reverse Proxy with Automatic HTTPS
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6.7
    container_name: brief-traefik
    restart: unless-stopped
    command:
      # API and Dashboard
      - "--api=true"
      - "--api.dashboard=true"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
      - "--accesslog=true"
      - "--ping=true"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      # ACME Certificate Resolver (Let's Encrypt)
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caServer=${TRAEFIK_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}"
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - deploy.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
      - ./traefik/users:/traefik-users:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN_PREFIX:-traefik}.${BASE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.usersfile=/traefik-users/.cache"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ---------------------------------------------------------------------------
  # Frontend — Next.js 16 Web Application
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        SITE_URL: ${SITE_URL}
    image: mbzuai-brief:latest
    container_name: brief-frontend
    restart: unless-stopped
    env_file:
      - deploy.env
    environment:
      # Server-side env (can override at runtime)
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REVALIDATION_SECRET=${REVALIDATION_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - ENABLE_AUDIO_BRIEF=${ENABLE_AUDIO_BRIEF:-false}
      - ENABLE_FRENCH_AUDIO=${ENABLE_FRENCH_AUDIO:-false}
      - GITHUB_PAT=${GITHUB_PAT:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN_PREFIX:-brief}.${BASE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ---------------------------------------------------------------------------
  # Dispatcher — FastAPI service that triggers GitHub Actions workflows
  # ---------------------------------------------------------------------------
  dispatcher:
    build:
      context: ./ops/cloud-run-dispatcher
    image: mbzuai-brief-dispatcher:latest
    container_name: brief-dispatcher
    restart: unless-stopped
    env_file:
      - deploy.env
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER:-shahin-trunk}
      - GITHUB_REPO=${GITHUB_REPO:-MBZUAI-Intelligence-Brief}
      - GITHUB_WORKFLOW_FILE=${GITHUB_WORKFLOW_FILE:-daily-brief.yml}
      - GITHUB_REF=${GITHUB_REF:-main}
      - PREVENT_DUPLICATE_SAME_DAY=${PREVENT_DUPLICATE_SAME_DAY:-1}
      - DISPATCH_TOKEN=${DISPATCH_TOKEN:-}
      - PORT=8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dispatcher.rule=Host(`${DISPATCHER_DOMAIN_PREFIX:-dispatch}.${BASE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.dispatcher.entrypoints=websecure"
      - "traefik.http.routers.dispatcher.tls.certresolver=letsencrypt"
      - "traefik.http.services.dispatcher.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8080/', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ---------------------------------------------------------------------------
  # Redis — Celery message broker and result backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: brief-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 2048
      --tcp-keepalive 300
      --timeout 300
      --hz 10
      --dynamic-hz yes
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis-data:/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------------------------------
  # Celery Worker — LLM/Claude script generation queue (Replica 1 of 3)
  # Optimized: 8 workers, 4GB RAM, prefetch=2 for better throughput
  # Total across 3 replicas: 24 concurrent LLM tasks
  # ---------------------------------------------------------------------------
  celery-worker-llm:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brief-celery-llm-1
    restart: unless-stopped
    command: celery -A celery_app worker -Q llm -c 8 --loglevel=info --prefetch-multiplier=2 --max-tasks-per-child=500 --hostname=llm-1@%h
    working_dir: /app
    env_file:
      - deploy.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CELERY_BEAT_SCHEDULE={}
      - CELERYD_HIJACK_ROOT_LOGGER=False
      - CELERYD_TASK_TIME_LIMIT=600
      - CELERYD_TASK_SOFT_TIME_LIMIT=540
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 2G

  # ---------------------------------------------------------------------------
  # Celery Worker — LLM/Claude script generation queue (Replica 2 of 3)
  # ---------------------------------------------------------------------------
  celery-worker-llm-2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brief-celery-llm-2
    restart: unless-stopped
    command: celery -A celery_app worker -Q llm -c 8 --loglevel=info --prefetch-multiplier=2 --max-tasks-per-child=500 --hostname=llm-2@%h
    working_dir: /app
    env_file:
      - deploy.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CELERY_BEAT_SCHEDULE={}
      - CELERYD_HIJACK_ROOT_LOGGER=False
      - CELERYD_TASK_TIME_LIMIT=600
      - CELERYD_TASK_SOFT_TIME_LIMIT=540
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 2G

  # ---------------------------------------------------------------------------
  # Celery Worker — LLM/Claude script generation queue (Replica 3 of 3)
  # ---------------------------------------------------------------------------
  celery-worker-llm-3:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brief-celery-llm-3
    restart: unless-stopped
    command: celery -A celery_app worker -Q llm -c 8 --loglevel=info --prefetch-multiplier=2 --max-tasks-per-child=500 --hostname=llm-3@%h
    working_dir: /app
    env_file:
      - deploy.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CELERY_BEAT_SCHEDULE={}
      - CELERYD_HIJACK_ROOT_LOGGER=False
      - CELERYD_TASK_TIME_LIMIT=600
      - CELERYD_TASK_SOFT_TIME_LIMIT=540
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 2G

  # ---------------------------------------------------------------------------
  # Celery Worker — Argent TTS audio generation queue
  # Optimized: 20 workers, 8GB RAM, prefetch=4 for high I/O parallelism
  # ---------------------------------------------------------------------------
  celery-worker-audio:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brief-celery-audio
    restart: unless-stopped
    command: celery -A celery_app worker -Q audio -c 20 --loglevel=info --prefetch-multiplier=4 --max-tasks-per-child=1000
    working_dir: /app
    env_file:
      - deploy.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CELERYD_HIJACK_ROOT_LOGGER=False
      - CELERYD_TASK_TIME_LIMIT=300
      - CELERYD_TASK_SOFT_TIME_LIMIT=270
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 8G
        reservations:
          cpus: "4.0"
          memory: 4G

  # ---------------------------------------------------------------------------
  # Celery Worker — Learning content orchestration queue
  # Optimized: 10 workers, 4GB RAM, prefetch=2 for balanced throughput
  # ---------------------------------------------------------------------------
  celery-worker-learning:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brief-celery-learning
    restart: unless-stopped
    command: celery -A celery_app worker -Q learning -c 10 --loglevel=info --prefetch-multiplier=2 --max-tasks-per-child=750
    working_dir: /app
    env_file:
      - deploy.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CELERYD_HIJACK_ROOT_LOGGER=False
      - CELERYD_TASK_TIME_LIMIT=600
      - CELERYD_TASK_SOFT_TIME_LIMIT=540
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 2G

volumes:
  letsencrypt-data:
  redis-data:
    name: brief-letsencrypt-data

networks:
  proxy:
    name: brief-proxy
    driver: bridge
